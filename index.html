<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade Word Guessing Game</title>
  <style>
    :root {
      --bg-main: #0a0a0c;
      --panel-bg: #121216;
      --border-color: #222227;
      --accent-color: #4f46e5;
      --accent-hover: #6366f1;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .game-container {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .status-panel {
      display: flex;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .turns-count {
      font-weight: bold;
      color: var(--error);
    }

    .word-display {
      font-size: 32px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      letter-spacing: 8px;
      margin: 32px 0;
      min-height: 45px;
      text-transform: uppercase;
    }

    .input-section {
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    input[type="text"] {
      background-color: #1a1a22;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 12px;
      border-radius: 8px;
      width: 60px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      text-transform: lowercase;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    .feedback-message {
      min-height: 24px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .feedback-message.success { color: var(--success); }
    .feedback-message.error { color: var(--error); }
    .feedback-message.info { color: var(--text-muted); }

    .used-letters {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .action-btn {
      width: 100%;
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <!-- SETUP SCREEN -->
    <div id="setup-screen">
      <h1>Word Guessing Game</h1>
      <p class="subtitle">Enter your identity to clear the registry and begin.</p>
      <div class="form-group">
        <input type="text" id="player-name" placeholder="Name" style="width: 200px; text-align: left; text-transform: none;">
        <button id="start-btn">Start Game</button>
      </div>
    </div>

    <!-- PLAY SCREEN -->
    <div id="play-screen" class="hidden">
      <h1 id="welcome-title">Good Luck!</h1>
      <p class="subtitle">Analyze the pattern and commit your characters.</p>

      <div class="status-panel">
        <div>Registry Tracker: <span id="player-identity"></span></div>
        <div>Remaining Turns: <span id="turns-display" class="turns-count">12</span></div>
      </div>

      <div id="word-container" class="word-display">_ _ _ _ _</div>

      <div class="input-section" id="interaction-box">
        <form id="guess-form" onsubmit="return false;">
          <div class="form-group">
            <input type="text" id="guess-input" maxlength="1" autocomplete="off" placeholder="?">
            <button type="submit" id="submit-guess-btn">Submit Payload</button>
          </div>
        </form>
      </div>

      <div id="feedback" class="feedback-message"></div>
      <div id="used-box" class="used-letters">Used Keys: None</div>
      
      <button id="reset-btn" class="action-btn hidden">Initialize New Session</button>
    </div>
  </div>

  <script>
    // DATA LAYER (Kumpulan kosakata bahasa Inggris yang dikustomisasi)
    const WORD_POOL = [
      'architecture', 'compiler', 'database', 'encryption', 'framework',
      'algorithm', 'javascript', 'interface', 'repository', 'asynchronous',
      'cybersecurity', 'deployment', 'optimization', 'variable', 'functional'
    ];

    // STATE LAYER
    let gameState = {
      playerName: 'Player',
      secretWord: '',
      guesses: new Set(),
      turns: 12,
      isOver: false
    };

    // DOM ELEMENTS
    const setupScreen = document.getElementById('setup-screen');
    const playScreen = document.getElementById('play-screen');
    const playerNameInput = document.getElementById('player-name');
    const startBtn = document.getElementById('start-btn');
    const welcomeTitle = document.getElementById('welcome-title');
    const playerIdentity = document.getElementById('player-identity');
    const turnsDisplay = document.getElementById('turns-display');
    const wordContainer = document.getElementById('word-container');
    const guessInput = document.getElementById('guess-input');
    const guessForm = document.getElementById('guess-form');
    const feedback = document.getElementById('feedback');
    const usedBox = document.getElementById('used-box');
    const resetBtn = document.getElementById('reset-btn');
    const interactionBox = document.getElementById('interaction-box');

    // CONTROL LOGIC
    function initGame() {
      const nameValue = playerNameInput.value.trim();
      gameState.playerName = nameValue ? nameValue : 'Player';
      
      welcomeTitle.textContent = `Good Luck, ${gameState.playerName}!`;
      playerIdentity.textContent = gameState.playerName;
      
      setupScreen.classList.add('hidden');
      playScreen.classList.remove('hidden');
      
      resetSession();
    }

    function resetSession() {
      gameState.secretWord = WORD_POOL[Math.floor(Math.random() * WORD_POOL.length)];
      gameState.guesses.clear();
      gameState.turns = 15;
      gameState.isOver = false;

      turnsDisplay.textContent = gameState.turns;
      feedback.textContent = '';
      feedback.className = 'feedback-message';
      usedBox.textContent = 'Used Keys: None';
      
      interactionBox.classList.remove('hidden');
      resetBtn.classList.add('hidden');
      guessInput.value = '';
      
      renderWord();
      guessInput.focus();
    }

    function renderWord() {
      const display = Array.from(gameState.secretWord).map(char => 
        gameState.guesses.has(char) ? char : '_'
      );
      wordContainer.textContent = display.join(' ');

      // Cek kemenangan
      if (!display.includes('_') && !gameState.isOver) {
        handleEndGame(true);
      }
    }

    function handleGuess() {
      if (gameState.isOver) return;

      const rawInput = guessInput.value.trim().toLowerCase();
      guessInput.value = '';
      guessInput.focus();

      // Validasi Input
      if (rawInput.length !== 1 || !/[a-z]/.test(rawInput)) {
        showFeedback('❌ Invalid payload. Enter a single alphabetical letter.', 'error');
        return;
      }

      if (gameState.guesses.has(rawInput)) {
        showFeedback(`⚠️ Character '${rawInput}' already committed inside registry.`, 'info');
        return;
      }

      // Commit tebakan
      gameState.guesses.add(rawInput);
      updateUsedLetters();

      // Evaluasi tebakan terhadap kata rahasia
      if (gameState.secretWord.includes(rawInput)) {
        showFeedback(`🎉 Absolute match! Character '${rawInput}' injected successfully.`, 'success');
        renderWord();
      } else {
        gameState.turns--;
        turnsDisplay.textContent = gameState.turns;
        showFeedback(`❌ Collision detected. Character '${rawInput}' does not exist.`, 'error');
        
        if (gameState.turns <= 0) {
          handleEndGame(false);
        }
      }
    }

    function updateUsedLetters() {
      const sortedLetters = Array.from(gameState.guesses).sort().join(', ');
      usedBox.textContent = `Used Keys: [ ${sortedLetters} ]`;
    }

    function showFeedback(text, type) {
      feedback.textContent = text;
      feedback.className = `feedback-message ${type}`;
    }

    function handleEndGame(isWin) {
      gameState.isOver = true;
      interactionBox.classList.add('hidden');
      resetBtn.classList.remove('hidden');

      if (isWin) {
        wordContainer.textContent = gameState.secretWord;
        showFeedback(`🏆 Operational Success. You correctly decoded the word: '${gameState.secretWord}'`, 'success');
      } else {
        wordContainer.textContent = gameState.secretWord;
        showFeedback(`💀 Core Meltdown. Session terminated. Correct word was: '${gameState.secretWord}'`, 'error');
      }
    }

    // EVENT BINDINGS
    startBtn.addEventListener('click', initGame);
    playerNameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') initGame(); });
    guessForm.addEventListener('submit', handleGuess);
    resetBtn.addEventListener('click', resetSession);
  </script>
</body>
</html>
